name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: glass-ai-bundle
          path: dist
          retention-days: 14
